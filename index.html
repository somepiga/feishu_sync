<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>知识库阅读台</title>
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f7f5;
      --bg-soft: #fbfbf9;
      --sidebar: rgba(248, 248, 246, 0.94);
      --panel: rgba(255, 255, 255, 0.9);
      --border: rgba(21, 24, 28, 0.08);
      --border-strong: rgba(21, 24, 28, 0.12);
      --text: #1f2328;
      --muted: #66707b;
      --muted-soft: #8c959f;
      --accent: #10a37f;
      --accent-soft: rgba(16, 163, 127, 0.12);
      --active: rgba(15, 23, 42, 0.06);
      --shadow: 0 20px 60px rgba(17, 24, 39, 0.06);
      --reader-width: 860px;
      --sidebar-width: 312px;
      --sidebar-collapsed-width: 92px;
      --transition: 180ms ease;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top left, rgba(16, 163, 127, 0.08), transparent 28%),
        linear-gradient(180deg, #fcfcfa 0%, var(--bg) 100%);
      color: var(--text);
      font-family: "Sohne", "Segoe UI Variable", "PingFang SC", "Helvetica Neue", sans-serif;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      background: none;
      color: inherit;
      cursor: pointer;
    }

    .app-shell {
      display: flex;
      min-height: 100vh;
      isolation: isolate;
    }

    .sidebar {
      position: relative;
      z-index: 3;
      display: flex;
      flex-direction: column;
      width: var(--sidebar-width);
      flex: 0 0 var(--sidebar-width);
      padding: 14px 12px 12px;
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      backdrop-filter: blur(18px);
      transition: width var(--transition), transform var(--transition), flex-basis var(--transition);
    }

    .sidebar-top {
      display: grid;
      gap: 12px;
      padding: 4px 4px 12px;
    }

    .brand-row {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 40px;
    }

    .brand-badge {
      width: 34px;
      height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      background: linear-gradient(135deg, #111827 0%, #374151 100%);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      flex: 0 0 auto;
    }

    .brand-copy {
      min-width: 0;
      flex: 1;
    }

    .brand-copy strong {
      display: block;
      font-size: 14px;
      line-height: 1.2;
    }

    .brand-copy span {
      display: block;
      margin-top: 2px;
      font-size: 12px;
      color: var(--muted);
    }

    .icon-button {
      width: 36px;
      height: 36px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      color: var(--muted);
      transition: background var(--transition), color var(--transition), transform var(--transition);
    }

    .icon-button:hover {
      background: rgba(15, 23, 42, 0.06);
      color: var(--text);
      transform: translateY(-1px);
    }

    .icon-button svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
    }

    .sidebar-action {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 11px 12px;
      border-radius: 14px;
      color: var(--text);
      background: #fff;
      box-shadow: inset 0 0 0 1px rgba(15, 23, 42, 0.06);
      transition: transform var(--transition), box-shadow var(--transition), background var(--transition);
    }

    .sidebar-action:hover {
      transform: translateY(-1px);
      box-shadow: inset 0 0 0 1px rgba(15, 23, 42, 0.09), 0 10px 24px rgba(15, 23, 42, 0.06);
    }

    .sidebar-action.primary {
      background: linear-gradient(180deg, #ffffff 0%, #f6fbf9 100%);
    }

    .sidebar-action svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      flex: 0 0 auto;
    }

    .sidebar-action-label {
      display: grid;
      gap: 2px;
      min-width: 0;
      text-align: left;
    }

    .sidebar-action-label strong {
      font-size: 14px;
      line-height: 1.25;
      font-weight: 600;
    }

    .sidebar-action-label span {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.3;
    }

    .search-wrap {
      position: relative;
    }

    .search-wrap svg {
      position: absolute;
      left: 12px;
      top: 50%;
      width: 16px;
      height: 16px;
      transform: translateY(-50%);
      stroke: var(--muted-soft);
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      height: 44px;
      padding: 0 14px 0 38px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.72);
      color: var(--text);
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition), background var(--transition);
    }

    .search-input:focus {
      border-color: rgba(16, 163, 127, 0.5);
      box-shadow: 0 0 0 4px rgba(16, 163, 127, 0.12);
      background: #fff;
    }

    .sidebar-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 8px 8px 10px;
      color: var(--muted);
      font-size: 12px;
      border-top: 1px solid rgba(15, 23, 42, 0.05);
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      max-width: 100%;
      padding: 8px 12px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: #0f7c61;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .status-pill::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: currentColor;
      box-shadow: 0 0 0 4px rgba(16, 163, 127, 0.12);
      flex: 0 0 auto;
    }

    .status-pill.warning {
      background: rgba(217, 119, 6, 0.12);
      color: #b45309;
    }

    .status-pill.hidden {
      background: rgba(59, 130, 246, 0.1);
      color: #2563eb;
    }

    .sidebar-scroll {
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding: 4px 2px 8px;
    }

    .sidebar-scroll::-webkit-scrollbar,
    .workspace-body::-webkit-scrollbar,
    .doc-body .doc-table-wrap::-webkit-scrollbar,
    .doc-body pre::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }

    .sidebar-scroll::-webkit-scrollbar-thumb,
    .workspace-body::-webkit-scrollbar-thumb,
    .doc-body .doc-table-wrap::-webkit-scrollbar-thumb,
    .doc-body pre::-webkit-scrollbar-thumb {
      border: 3px solid transparent;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.16);
      background-clip: padding-box;
    }

    .nav-group {
      margin-bottom: 18px;
    }

    .nav-group-label {
      padding: 6px 10px 8px;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted-soft);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .nav-stack {
      display: grid;
      gap: 4px;
    }

    .nav-item {
      display: block;
      width: 100%;
      padding: 12px 12px 12px calc(12px + (min(var(--depth, 0), 4) * 14px));
      border-radius: 16px;
      text-align: left;
      transition: background var(--transition), transform var(--transition), color var(--transition);
    }

    .nav-item-short {
      display: none;
    }

    .nav-item:hover {
      background: rgba(15, 23, 42, 0.045);
      transform: translateX(2px);
    }

    .nav-item.active {
      background: var(--active);
      box-shadow: inset 0 0 0 1px rgba(15, 23, 42, 0.05);
    }

    .nav-item-title {
      display: block;
      font-size: 14px;
      line-height: 1.35;
      font-weight: 600;
      color: var(--text);
      word-break: break-word;
    }

    .nav-item-meta {
      display: block;
      margin-top: 4px;
      font-size: 12px;
      line-height: 1.35;
      color: var(--muted);
      word-break: break-word;
    }

    .nav-placeholder {
      display: grid;
      gap: 10px;
      padding: 8px 6px;
    }

    .nav-placeholder-note {
      padding: 0 6px 4px;
      font-size: 13px;
      line-height: 1.6;
      color: var(--muted);
    }

    .skeleton-line {
      height: 46px;
      border-radius: 15px;
      background: linear-gradient(90deg, rgba(15, 23, 42, 0.04) 0%, rgba(15, 23, 42, 0.08) 50%, rgba(15, 23, 42, 0.04) 100%);
      background-size: 220% 100%;
      animation: shimmer 1.8s linear infinite;
    }

    .sidebar-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 8px 4px;
      border-top: 1px solid rgba(15, 23, 42, 0.05);
    }

    .profile-pill {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      flex: 1;
      padding: 10px 12px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.72);
      box-shadow: inset 0 0 0 1px rgba(15, 23, 42, 0.05);
    }

    .profile-avatar {
      width: 30px;
      height: 30px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #10a37f 0%, #4f46e5 100%);
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      flex: 0 0 auto;
    }

    .profile-copy {
      min-width: 0;
    }

    .profile-copy strong,
    .profile-copy span {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .profile-copy strong {
      font-size: 13px;
      font-weight: 600;
    }

    .profile-copy span {
      margin-top: 2px;
      font-size: 12px;
      color: var(--muted);
    }

    .workspace {
      display: flex;
      flex: 1;
      min-width: 0;
      min-height: 100vh;
      flex-direction: column;
      position: relative;
    }

    .workspace-header {
      position: sticky;
      top: 0;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 22px;
      background: rgba(250, 250, 248, 0.82);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(16px);
    }

    .workspace-leading {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .mobile-only {
      display: none;
    }

    .crumb-stack {
      min-width: 0;
    }

    .crumb-label {
      font-size: 12px;
      line-height: 1.3;
      color: var(--muted-soft);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .crumb-path {
      margin-top: 4px;
      font-size: 14px;
      line-height: 1.45;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .workspace-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 0 0 auto;
    }

    .workspace-body {
      position: relative;
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding: 18px 0 64px;
    }

    .reading-rail {
      position: fixed;
      top: 132px;
      left: calc(var(--sidebar-width) + 18px);
      z-index: 1;
      display: grid;
      gap: 10px;
      transition: left var(--transition), opacity var(--transition);
      pointer-events: none;
    }

    .reading-rail span {
      display: block;
      width: 34px;
      height: 4px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.09);
    }

    .reading-rail span:first-child {
      height: 5px;
      background: rgba(15, 23, 42, 0.92);
    }

    .reader-panel {
      width: min(calc(100% - 88px), calc(var(--reader-width) + 96px));
      margin: 0 auto;
      padding: 28px 24px 0;
    }

    .article,
    .reader-empty {
      width: min(100%, var(--reader-width));
      margin: 0 auto;
      animation: fadeUp 260ms ease;
    }

    .reader-empty {
      padding: 48px 32px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.74);
      box-shadow: var(--shadow);
      border: 1px solid rgba(15, 23, 42, 0.05);
    }

    .empty-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(59, 130, 246, 0.1);
      color: #2563eb;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .reader-empty h1 {
      margin: 16px 0 14px;
      font-size: clamp(34px, 6vw, 54px);
      line-height: 1.06;
      letter-spacing: -0.02em;
    }

    .reader-empty p {
      margin: 0;
      max-width: 700px;
      font-size: 18px;
      line-height: 1.8;
      color: var(--muted);
    }

    .empty-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 28px;
    }

    .empty-card {
      padding: 18px 18px 16px;
      border-radius: 20px;
      background: rgba(250, 250, 249, 0.92);
      border: 1px solid rgba(15, 23, 42, 0.06);
    }

    .empty-card strong {
      display: block;
      font-size: 14px;
      line-height: 1.35;
      margin-bottom: 6px;
    }

    .empty-card span {
      display: block;
      font-size: 13px;
      line-height: 1.65;
      color: var(--muted);
    }

    .article {
      padding-bottom: 80px;
    }

    .doc-hero {
      margin-bottom: 26px;
    }

    .doc-kicker {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.05);
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .doc-kicker::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 0 4px rgba(16, 163, 127, 0.12);
    }

    .doc-title {
      margin: 20px 0 10px;
      font-size: clamp(34px, 6vw, 58px);
      line-height: 1.04;
      letter-spacing: -0.03em;
    }

    .doc-summary {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 8px;
      color: var(--muted);
    }

    .doc-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.045);
      font-size: 13px;
      line-height: 1.3;
    }

    .doc-body {
      font-size: 18px;
      line-height: 1.88;
      color: #1f2328;
      word-break: break-word;
    }

    .doc-body h1,
    .doc-body h2,
    .doc-body h3,
    .doc-body h4,
    .doc-body h5,
    .doc-body h6 {
      margin: 42px 0 16px;
      line-height: 1.2;
      letter-spacing: -0.02em;
      color: #111827;
    }

    .doc-body h1 {
      font-size: 2.15em;
    }

    .doc-body h2 {
      font-size: 1.78em;
    }

    .doc-body h3 {
      font-size: 1.42em;
    }

    .doc-body p,
    .doc-body ul,
    .doc-body ol,
    .doc-body blockquote,
    .doc-body pre,
    .doc-body .doc-image,
    .doc-body .attachment,
    .doc-body .doc-grid,
    .doc-body .doc-table-wrap {
      margin: 18px 0;
    }

    .doc-body ul,
    .doc-body ol {
      padding-left: 1.4em;
    }

    .doc-body li + li {
      margin-top: 8px;
    }

    .doc-body blockquote {
      padding: 14px 18px;
      border-left: 4px solid rgba(16, 163, 127, 0.38);
      border-radius: 0 18px 18px 0;
      background: rgba(16, 163, 127, 0.06);
      color: #334155;
    }

    .doc-body code {
      font-family: "Cascadia Code", "SFMono-Regular", Consolas, monospace;
      font-size: 0.9em;
    }

    .doc-body p code,
    .doc-body li code,
    .doc-body blockquote code,
    .doc-body td code {
      padding: 3px 8px;
      border-radius: 10px;
      background: rgba(15, 23, 42, 0.06);
      color: #1d4ed8;
    }

    .doc-body pre {
      overflow: auto;
      padding: 18px 20px;
      border-radius: 20px;
      border: 1px solid rgba(15, 23, 42, 0.06);
      background: #f6f7f8;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.65);
    }

    .doc-body pre code {
      color: #111827;
    }

    .doc-body a {
      color: #0f766e;
      text-decoration: none;
      font-weight: 600;
    }

    .doc-body a:hover {
      text-decoration: underline;
    }

    .doc-body .doc-image img {
      display: block;
      max-width: 100%;
      height: auto;
      border-radius: 20px;
      box-shadow: 0 18px 42px rgba(15, 23, 42, 0.08);
      border: 1px solid rgba(15, 23, 42, 0.06);
      background: #fff;
    }

    .doc-grid {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .doc-grid-column {
      min-width: 0;
      flex: 1 1 240px;
    }

    .doc-table-wrap {
      overflow: auto;
      border-radius: 20px;
      border: 1px solid rgba(15, 23, 42, 0.06);
      background: rgba(255, 255, 255, 0.72);
    }

    .doc-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 15px;
      line-height: 1.65;
    }

    .doc-table td {
      min-width: 120px;
      padding: 12px 14px;
      border: 1px solid rgba(15, 23, 42, 0.06);
      vertical-align: top;
    }

    .backdrop {
      position: fixed;
      inset: 0;
      z-index: 2;
      background: rgba(15, 23, 42, 0.4);
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--transition);
    }

    .app-shell.sidebar-collapsed .sidebar {
      width: var(--sidebar-collapsed-width);
      flex-basis: var(--sidebar-collapsed-width);
    }

    .app-shell.sidebar-collapsed .brand-copy,
    .app-shell.sidebar-collapsed .sidebar-action-label,
    .app-shell.sidebar-collapsed .search-wrap,
    .app-shell.sidebar-collapsed .sidebar-meta,
    .app-shell.sidebar-collapsed .nav-group-label,
    .app-shell.sidebar-collapsed .nav-item-meta,
    .app-shell.sidebar-collapsed .profile-copy {
      display: none;
    }

    .app-shell.sidebar-collapsed .sidebar-top,
    .app-shell.sidebar-collapsed .sidebar-footer {
      padding-left: 2px;
      padding-right: 2px;
    }

    .app-shell.sidebar-collapsed .sidebar-action,
    .app-shell.sidebar-collapsed .profile-pill {
      justify-content: center;
      padding-left: 10px;
      padding-right: 10px;
    }

    .app-shell.sidebar-collapsed .nav-item {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 62px;
      padding: 8px;
      border-radius: 20px;
      transform: none;
    }

    .app-shell.sidebar-collapsed .nav-item-title {
      display: none;
    }

    .app-shell.sidebar-collapsed .nav-item-short {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 48px;
      max-width: 100%;
      min-height: 48px;
      padding: 10px 8px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.78);
      box-shadow: inset 0 0 0 1px rgba(15, 23, 42, 0.06);
      color: var(--text);
      font-size: 14px;
      line-height: 1.15;
      font-weight: 700;
      text-align: center;
      word-break: keep-all;
      overflow: hidden;
    }

    .app-shell.sidebar-collapsed .nav-item.active .nav-item-short {
      background: rgba(15, 23, 42, 0.1);
      box-shadow: inset 0 0 0 1px rgba(15, 23, 42, 0.08);
    }

    .app-shell.sidebar-collapsed .reading-rail {
      left: calc(var(--sidebar-collapsed-width) + 18px);
    }

    @keyframes shimmer {
      0% {
        background-position: 200% 0;
      }

      100% {
        background-position: -20% 0;
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 1100px) {
      .reading-rail {
        display: none;
      }

      .reader-panel {
        width: min(calc(100% - 32px), calc(var(--reader-width) + 48px));
      }
    }

    @media (max-width: 900px) {
      body {
        overflow: auto;
      }

      .sidebar {
        position: fixed;
        inset: 0 auto 0 0;
        width: min(84vw, 320px);
        flex-basis: auto;
        transform: translateX(-100%);
        box-shadow: 0 20px 60px rgba(15, 23, 42, 0.22);
      }

      .app-shell.sidebar-open .sidebar {
        transform: translateX(0);
      }

      .app-shell.sidebar-open .backdrop {
        opacity: 1;
        pointer-events: auto;
      }

      .mobile-only {
        display: inline-flex;
      }

      .workspace-header {
        padding: 14px 16px;
      }

      .workspace-body {
        padding-top: 4px;
      }

      .reader-panel {
        width: min(100%, calc(100% - 8px));
        padding: 22px 16px 0;
      }

      .reader-empty {
        padding: 32px 22px;
        border-radius: 22px;
      }

      .reader-empty p,
      .doc-body {
        font-size: 16px;
      }

      .empty-grid {
        grid-template-columns: 1fr;
      }

      .doc-title {
        font-size: clamp(32px, 8vw, 44px);
      }

      .crumb-label {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell" id="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-top">
        <div class="brand-row">
          <div class="brand-badge">KB</div>
          <div class="brand-copy">
            <strong>知识库阅读台</strong>
            <span>ChatGPT 风格文档前端</span>
          </div>
          <button class="icon-button" id="sidebar-toggle" type="button" aria-label="切换侧边栏">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8">
              <path d="M4 7h16M4 12h10M4 17h16" stroke-linecap="round"></path>
            </svg>
          </button>
        </div>

        <button class="sidebar-action primary" id="jump-first-btn" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8">
            <path d="M12 5v14M5 12h14" stroke-linecap="round"></path>
          </svg>
          <span class="sidebar-action-label">
            <strong>打开第一篇文档</strong>
            <span>内容重新开放后可直接开始阅读</span>
          </span>
        </button>

        <label class="search-wrap" aria-label="搜索文档">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8">
            <circle cx="11" cy="11" r="6.5"></circle>
            <path d="M16 16l4 4" stroke-linecap="round"></path>
          </svg>
          <input class="search-input" id="doc-search" type="search" placeholder="搜索文档标题或路径">
        </label>
      </div>

      <div class="sidebar-meta">
        <span id="doc-count">0 篇文档</span>
        <span class="status-pill hidden" id="sync-pill">站点当前隐藏中</span>
      </div>

      <div class="sidebar-scroll" id="tree-root"></div>

      <div class="sidebar-footer">
        <div class="profile-pill">
          <span class="profile-avatar">AI</span>
          <span class="profile-copy">
            <strong>GitHub Pages</strong>
            <span>前端布局可先调试，内容暂不公开</span>
          </span>
        </div>
      </div>
    </aside>

    <div class="backdrop" id="sidebar-backdrop"></div>

    <main class="workspace">
      <header class="workspace-header">
        <div class="workspace-leading">
          <button class="icon-button mobile-only" id="mobile-sidebar-open" type="button" aria-label="打开侧边栏">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8">
              <path d="M4 7h16M4 12h16M4 17h16" stroke-linecap="round"></path>
            </svg>
          </button>

          <div class="crumb-stack">
            <div class="crumb-label">Knowledge Mirror / Reader</div>
            <div class="crumb-path" id="breadcrumbs">正在检查公开内容状态…</div>
          </div>
        </div>

        <div class="workspace-actions">
          <button class="icon-button" id="copy-link-btn" type="button" aria-label="复制当前页面链接">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8">
              <path d="M9 15l6-6" stroke-linecap="round"></path>
              <path d="M7.5 7.5h-1a3.5 3.5 0 0 0 0 7h1" stroke-linecap="round"></path>
              <path d="M16.5 7.5h1a3.5 3.5 0 0 1 0 7h-1" stroke-linecap="round"></path>
            </svg>
          </button>

          <button class="icon-button" id="scroll-top-btn" type="button" aria-label="回到顶部">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8">
              <path d="M12 18V6" stroke-linecap="round"></path>
              <path d="M7 11l5-5 5 5" stroke-linecap="round" stroke-linejoin="round"></path>
            </svg>
          </button>
        </div>
      </header>

      <section class="workspace-body" id="workspace-body">
        <div class="reading-rail" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
        </div>

        <div class="reader-panel">
          <article id="article-root" class="reader-empty">
            <span class="empty-badge">Loading</span>
            <h1>正在连接文档内容</h1>
            <p>如果同步结果已经存在，这里会自动切换到完整的目录与阅读视图；如果还没有公开内容，则保持隐藏态。</p>
          </article>
        </div>
      </section>
    </main>
  </div>

  <script>
    const CONTENT_MODE = "live";
    const MANIFEST_URL = "content/documents-index.json";
    const DOCS_DIR_URL = "content/documents/";

    const state = {
      docs: [],
      tree: [],
      docsById: new Map(),
      docsByNodeToken: new Map(),
      docCache: new Map(),
      activeId: null,
      searchQuery: "",
      lastSource: "hidden",
    };

    const refs = {
      appShell: document.getElementById("app-shell"),
      treeRoot: document.getElementById("tree-root"),
      articleRoot: document.getElementById("article-root"),
      breadcrumbs: document.getElementById("breadcrumbs"),
      docCount: document.getElementById("doc-count"),
      syncPill: document.getElementById("sync-pill"),
      docSearch: document.getElementById("doc-search"),
      jumpFirstButton: document.getElementById("jump-first-btn"),
      workspaceBody: document.getElementById("workspace-body"),
      copyLinkButton: document.getElementById("copy-link-btn"),
      scrollTopButton: document.getElementById("scroll-top-btn"),
      sidebarToggle: document.getElementById("sidebar-toggle"),
      mobileSidebarOpen: document.getElementById("mobile-sidebar-open"),
      sidebarBackdrop: document.getElementById("sidebar-backdrop"),
    };

    async function loadDocs() {
      if (CONTENT_MODE !== "live") {
        renderHiddenState();
        return;
      }

      setSyncState("正在连接同步结果", "hidden");
      refs.breadcrumbs.textContent = "正在检查公开内容状态…";
      renderSidebarPlaceholder("正在检查是否存在已公开的文档目录…");

      try {
        const docs = await loadDocsFromManifest();
        initializeDocs(docs, "manifest");
      } catch (manifestError) {
        try {
          const docs = await loadDocsFromDirectoryListing();
          initializeDocs(docs, "directory");
        } catch (directoryError) {
          renderHiddenState(manifestError, directoryError);
        }
      }
    }

    async function loadDocsFromManifest() {
      const response = await fetch(MANIFEST_URL, { cache: "no-store" });
      if (!response.ok) {
        throw new Error(`manifest 请求失败 (${response.status})`);
      }

      const payload = await response.json();
      return (payload.documents || []).map((doc) => normalizeDocMeta(doc));
    }

    async function loadDocsFromDirectoryListing() {
      const response = await fetch(DOCS_DIR_URL, { cache: "no-store" });
      if (!response.ok) {
        throw new Error(`目录列表请求失败 (${response.status})`);
      }

      const htmlText = await response.text();
      const parser = new DOMParser();
      const doc = parser.parseFromString(htmlText, "text/html");
      const files = [];

      doc.querySelectorAll("a").forEach((link) => {
        const href = link.getAttribute("href");
        if (href && href.endsWith(".json")) {
          files.push(DOCS_DIR_URL + href);
        }
      });

      const docs = await Promise.all(
        files.map(async (file, index) => {
          const item = await fetch(file, { cache: "no-store" }).then((res) => res.json());
          return normalizeDocMeta({ ...item, file, order: index, embedded: item });
        })
      );

      return docs;
    }

    function normalizeDocMeta(doc) {
      const normalized = { ...doc };
      normalized.file = doc.file || `${DOCS_DIR_URL}${doc.id}.json`;
      normalized.node_token = doc.node_token || doc.id;
      normalized.parent_node_token = doc.parent_node_token || null;
      normalized.title = doc.title || "Untitled";
      normalized.order = Number.isFinite(doc.order) ? doc.order : Number.MAX_SAFE_INTEGER;
      return normalized;
    }

    function initializeDocs(docs, source) {
      state.docs = docs;
      state.tree = buildTree(docs);
      state.lastSource = source;
      state.docsById = new Map();
      state.docsByNodeToken = new Map();
      state.docCache = new Map();

      docs.forEach((doc) => {
        state.docsById.set(doc.id, doc);
        state.docsByNodeToken.set(doc.node_token, doc);
        if (doc.embedded) {
          state.docCache.set(doc.id, doc.embedded);
        }
      });

      refs.docCount.textContent = `${docs.length} 篇文档`;
      setSyncState(
        source === "manifest" ? "已从清单加载正文" : "已进入目录回退模式",
        source === "manifest" ? "ready" : "warning"
      );

      refs.jumpFirstButton.disabled = docs.length === 0;
      refs.jumpFirstButton.style.opacity = docs.length === 0 ? "0.5" : "1";

      renderTree();

      if (!docs.length) {
        renderHiddenState(new Error("当前没有已公开的文档"), new Error("目录为空"));
        return;
      }

      const requestedDocId = getRequestedDocId();
      const nextDoc = requestedDocId && state.docsById.has(requestedDocId) ? requestedDocId : docs[0].id;
      selectDoc(nextDoc, { updateHash: false });
    }

    function buildTree(docs) {
      const nodeMap = new Map();
      docs.forEach((doc) => {
        nodeMap.set(doc.node_token, { doc, children: [] });
      });

      const roots = [];
      docs.forEach((doc) => {
        const current = nodeMap.get(doc.node_token);
        if (doc.parent_node_token && nodeMap.has(doc.parent_node_token)) {
          nodeMap.get(doc.parent_node_token).children.push(current);
        } else {
          roots.push(current);
        }
      });

      const sortNodes = (nodes) => {
        nodes.sort((left, right) => {
          if (left.doc.order !== right.doc.order) {
            return left.doc.order - right.doc.order;
          }
          return left.doc.title.localeCompare(right.doc.title, "zh-CN");
        });
        nodes.forEach((node) => sortNodes(node.children));
      };

      sortNodes(roots);
      return roots;
    }

    function renderTree() {
      refs.treeRoot.innerHTML = "";

      if (!state.docs.length) {
        renderSidebarPlaceholder("当前没有公开内容。");
        return;
      }

      const query = state.searchQuery.trim().toLowerCase();
      if (query) {
        const matchedDocs = state.docs.filter((doc) => {
          const title = doc.title.toLowerCase();
          const path = buildBreadcrumbs(doc).join(" / ").toLowerCase();
          return title.includes(query) || path.includes(query);
        });

        if (!matchedDocs.length) {
          refs.treeRoot.innerHTML = `
            <div class="nav-placeholder">
              <div class="nav-placeholder-note">没有找到与“${escapeHtml(state.searchQuery)}”相关的文档。</div>
            </div>
          `;
          return;
        }

        const section = document.createElement("section");
        section.className = "nav-group";
        section.innerHTML = `<div class="nav-group-label">Search Results</div>`;
        const stack = document.createElement("div");
        stack.className = "nav-stack";

        matchedDocs.forEach((doc) => {
          stack.appendChild(createNavButton(doc, 0, buildBreadcrumbs(doc).join(" / ")));
        });

        section.appendChild(stack);
        refs.treeRoot.appendChild(section);
        highlightActiveNode();
        return;
      }

      state.tree.forEach((rootNode, index) => {
        const section = document.createElement("section");
        section.className = "nav-group";
        section.innerHTML = `<div class="nav-group-label">Section ${String(index + 1).padStart(2, "0")}</div>`;

        const stack = document.createElement("div");
        stack.className = "nav-stack";
        appendTreeButtons(rootNode, stack, 0);
        section.appendChild(stack);
        refs.treeRoot.appendChild(section);
      });

      highlightActiveNode();
    }

    function appendTreeButtons(node, container, depth) {
      container.appendChild(createNavButton(node.doc, depth, formatUpdatedAt(node.doc.updated_at)));
      node.children.forEach((child) => appendTreeButtons(child, container, depth + 1));
    }

    function createNavButton(doc, depth, metaText) {
      const button = document.createElement("button");
      button.type = "button";
      button.className = "nav-item";
      button.dataset.docId = doc.id;
      button.title = doc.title || "Untitled";
      button.setAttribute("aria-label", doc.title || "Untitled");
      button.style.setProperty("--depth", Math.min(depth, 4));
      button.innerHTML = `
        <span class="nav-item-short" aria-hidden="true">${escapeHtml(makeCollapsedLabel(doc.title))}</span>
        <span class="nav-item-title">${escapeHtml(doc.title)}</span>
        <span class="nav-item-meta">${escapeHtml(metaText || "")}</span>
      `;
      button.addEventListener("click", () => {
        selectDoc(doc.id);
        setSidebarOpen(false);
      });
      return button;
    }

    function renderSidebarPlaceholder(message) {
      refs.treeRoot.innerHTML = `
        <div class="nav-placeholder">
          <div class="nav-placeholder-note">${escapeHtml(message)}</div>
          <div class="skeleton-line"></div>
          <div class="skeleton-line"></div>
          <div class="skeleton-line"></div>
          <div class="skeleton-line"></div>
          <div class="skeleton-line"></div>
        </div>
      `;
    }

    function renderHiddenState(manifestError, directoryError) {
      state.docs = [];
      state.tree = [];
      state.activeId = null;
      refs.docCount.textContent = "未公开";
      refs.breadcrumbs.textContent = "当前站点处于隐藏状态";
      refs.jumpFirstButton.disabled = true;
      refs.jumpFirstButton.style.opacity = "0.5";
      setSyncState("内容未公开", "hidden");
      renderSidebarPlaceholder("目录和正文尚未重新发布。当前只保留界面壳子，知识库内容仍处于隐藏状态。");

      refs.articleRoot.className = "reader-empty";
      refs.articleRoot.innerHTML = `
        <span class="empty-badge">Private Preview</span>
        <h1>新的阅读前端已经就位</h1>
        <p>当前 GitHub Pages 仍然保持隐藏态，所以这里不会加载真实的知识库内容。等你重新同步文档并决定开放之后，这个界面会自动切换成完整的目录导航与正文阅读视图。</p>
        <div class="empty-grid">
          <div class="empty-card">
            <strong>左侧像 ChatGPT 一样的工作台</strong>
            <span>支持搜索、活动项高亮、层级目录扁平化展示和折叠式侧边栏。</span>
          </div>
          <div class="empty-card">
            <strong>中间是沉浸式阅读区</strong>
            <span>正文宽度、标题层级、代码块、表格、附件和图片样式都按阅读体验重新整理。</span>
          </div>
          <div class="empty-card">
            <strong>重新开放时无需再改前端</strong>
            <span>只要把 <code>content/documents-index.json</code> 和文档资源重新发布回来，这个页面就会恢复为可用状态。</span>
          </div>
          <div class="empty-card">
            <strong>当前仍保持 noindex</strong>
            <span>公开之前仍然禁止搜索引擎索引。如果后面要正式开放，再把这个限制一并解除。</span>
          </div>
        </div>
      `;

      if (manifestError) {
        console.info("Manifest unavailable:", manifestError.message);
      }
      if (directoryError) {
        console.info("Directory fallback unavailable:", directoryError.message);
      }
    }

    async function selectDoc(docId, options = {}) {
      const { updateHash = true } = options;
      state.activeId = docId;
      highlightActiveNode();
      refs.articleRoot.className = "reader-empty";
      refs.articleRoot.innerHTML = `
        <span class="empty-badge">Loading</span>
        <h1>正在展开文档</h1>
        <p>稍等一下，我们正在载入正文、图片和附件资源。</p>
      `;

      try {
        const doc = await getFullDoc(docId);
        renderDoc(doc);
        if (updateHash) {
          history.replaceState(null, "", `#doc=${encodeURIComponent(docId)}`);
        }
      } catch (error) {
        refs.articleRoot.className = "reader-empty";
        refs.articleRoot.innerHTML = `
          <span class="empty-badge">Load Error</span>
          <h1>文档暂时无法打开</h1>
          <p>${escapeHtml(error.message)}</p>
        `;
      }
    }

    function highlightActiveNode() {
      document.querySelectorAll(".nav-item").forEach((button) => {
        button.classList.toggle("active", button.dataset.docId === state.activeId);
      });
    }

    async function getFullDoc(docId) {
      if (state.docCache.has(docId)) {
        return state.docCache.get(docId);
      }

      const meta = state.docsById.get(docId);
      if (!meta) {
        throw new Error("未找到文档元数据");
      }

      const response = await fetch(meta.file, { cache: "no-store" });
      if (!response.ok) {
        throw new Error(`文档请求失败 (${response.status})`);
      }

      const doc = await response.json();
      state.docCache.set(docId, doc);
      return doc;
    }

    function renderDoc(doc) {
      const assets = Array.isArray(doc.assets) ? doc.assets.length : 0;
      const bodyHtml = doc.render_html
        ? `<div class="doc-body">${doc.render_html}</div>`
        : `<div class="doc-body"><p>${escapeHtml(doc.raw_content || "（无内容）").replaceAll("\\n", "<br>")}</p></div>`;

      refs.articleRoot.className = "article";
      refs.articleRoot.innerHTML = `
        <div class="doc-hero">
          <div class="doc-kicker">Document Reader</div>
          <h1 class="doc-title">${escapeHtml(doc.title || "Untitled")}</h1>
          <div class="doc-summary">
            <span class="doc-chip">最近更新：${escapeHtml(formatUpdatedAt(doc.updated_at))}</span>
            <span class="doc-chip">资源数量：${assets}</span>
            <span class="doc-chip">来源：${state.lastSource === "manifest" ? "同步清单" : "目录扫描"}</span>
          </div>
        </div>
        ${bodyHtml}
      `;

      refs.breadcrumbs.textContent = buildBreadcrumbs(doc).join(" / ");
    }

    function buildBreadcrumbs(doc) {
      const names = [];
      const visited = new Set();
      let current = doc;

      while (current && current.node_token && !visited.has(current.node_token)) {
        visited.add(current.node_token);
        names.unshift(current.title || "Untitled");
        if (!current.parent_node_token) {
          break;
        }
        current = state.docsByNodeToken.get(current.parent_node_token);
      }

      return names.length ? names : ["未找到层级信息"];
    }

    function getRequestedDocId() {
      const hash = window.location.hash.startsWith("#") ? window.location.hash.slice(1) : "";
      const params = new URLSearchParams(hash);
      return params.get("doc");
    }

    function setSyncState(text, tone) {
      refs.syncPill.textContent = text;
      refs.syncPill.className = "status-pill";

      if (tone === "warning") {
        refs.syncPill.classList.add("warning");
      } else if (tone === "hidden") {
        refs.syncPill.classList.add("hidden");
      }
    }

    function setSidebarOpen(open) {
      if (window.innerWidth <= 900) {
        refs.appShell.classList.toggle("sidebar-open", open);
      } else {
        refs.appShell.classList.toggle("sidebar-collapsed", !open);
      }
    }

    function formatUpdatedAt(value) {
      if (!value) {
        return "更新时间未知";
      }

      const date = typeof value === "number" ? new Date(value) : new Date(String(value));
      if (Number.isNaN(date.getTime())) {
        return String(value);
      }

      return date.toLocaleString("zh-CN", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
      });
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function makeCollapsedLabel(title) {
      const value = String(title || "").trim();
      if (!value) {
        return "DOC";
      }

      const chineseChars = Array.from(value.matchAll(/[\p{Script=Han}]/gu), (item) => item[0]);
      if (chineseChars.length >= 2) {
        return chineseChars.slice(0, 2).join("");
      }
      if (chineseChars.length === 1) {
        return chineseChars[0];
      }

      const wordParts = value
        .split(/[\s\-_/]+/)
        .map((part) => part.trim())
        .filter(Boolean);

      if (wordParts.length >= 2) {
        return wordParts
          .slice(0, 2)
          .map((part) => Array.from(part)[0] || "")
          .join("")
          .toUpperCase();
      }

      return Array.from(value).slice(0, 3).join("").toUpperCase();
    }

    refs.docSearch.addEventListener("input", (event) => {
      state.searchQuery = event.target.value || "";
      renderTree();
    });

    refs.jumpFirstButton.addEventListener("click", () => {
      if (!state.docs.length) {
        return;
      }
      selectDoc(state.docs[0].id);
    });

    refs.copyLinkButton.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(window.location.href);
        setSyncState("链接已复制", "ready");
        window.setTimeout(() => {
          setSyncState(state.docs.length ? "已从清单加载正文" : "内容未公开", state.docs.length ? "ready" : "hidden");
        }, 1600);
      } catch (error) {
        console.error("Copy failed:", error);
      }
    });

    refs.scrollTopButton.addEventListener("click", () => {
      refs.workspaceBody.scrollTo({ top: 0, behavior: "smooth" });
    });

    refs.sidebarToggle.addEventListener("click", () => {
      if (window.innerWidth <= 900) {
        setSidebarOpen(false);
      } else {
        refs.appShell.classList.toggle("sidebar-collapsed");
      }
    });

    refs.mobileSidebarOpen.addEventListener("click", () => {
      refs.appShell.classList.add("sidebar-open");
    });

    refs.sidebarBackdrop.addEventListener("click", () => {
      refs.appShell.classList.remove("sidebar-open");
    });

    window.addEventListener("resize", () => {
      if (window.innerWidth > 900) {
        refs.appShell.classList.remove("sidebar-open");
      }
    });

    loadDocs();
  </script>
</body>
</html>
