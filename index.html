<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>飞书知识库镜像</title>
  <style>
    :root {
      --bg: #f3efe6;
      --panel: rgba(255, 252, 246, 0.88);
      --panel-strong: #fffdf8;
      --border: rgba(73, 56, 30, 0.14);
      --text: #2d2418;
      --muted: #7e6b52;
      --accent: #b85c38;
      --accent-soft: rgba(184, 92, 56, 0.12);
      --shadow: 0 20px 50px rgba(70, 48, 23, 0.12);
      --radius: 24px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.7), transparent 32%),
        linear-gradient(135deg, #f8f3e9 0%, #efe6d5 50%, #f5eee2 100%);
    }

    .shell {
      width: min(1320px, calc(100% - 32px));
      margin: 24px auto;
      padding: 20px;
      border: 1px solid var(--border);
      border-radius: 28px;
      background: rgba(255, 250, 242, 0.72);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--border);
    }

    .title-wrap h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 42px);
      line-height: 1.05;
      letter-spacing: 0.02em;
    }

    .title-wrap p {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .meta {
      text-align: right;
      color: var(--muted);
      font-size: 13px;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(280px, 360px) minmax(0, 1fr);
      gap: 20px;
      min-height: 72vh;
    }

    .panel {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--panel);
      backdrop-filter: blur(18px);
    }

    .tree-panel {
      padding: 18px 16px 20px;
      overflow: auto;
    }

    .tree-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .tree-header h2,
    .content-header h2 {
      margin: 0;
      font-size: 15px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .count-badge {
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
    }

    .tree-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .tree-list .tree-list {
      margin-left: 14px;
      padding-left: 12px;
      border-left: 1px dashed rgba(120, 95, 60, 0.24);
    }

    .tree-item {
      margin: 4px 0;
    }

    .tree-button {
      width: 100%;
      border: 0;
      border-radius: 14px;
      padding: 10px 12px;
      background: transparent;
      color: inherit;
      text-align: left;
      cursor: pointer;
      transition: background 0.18s ease, transform 0.18s ease, color 0.18s ease;
    }

    .tree-button:hover {
      background: rgba(255, 255, 255, 0.58);
      transform: translateX(2px);
    }

    .tree-button.active {
      background: var(--accent-soft);
      color: var(--accent);
    }

    .tree-title {
      display: block;
      font-size: 14px;
      line-height: 1.45;
      font-weight: 600;
    }

    .tree-meta {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .content-panel {
      padding: 22px 24px 28px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .content-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .breadcrumbs {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .article {
      flex: 1;
      overflow: auto;
      padding: 28px;
      border-radius: 20px;
      background: var(--panel-strong);
      box-shadow: inset 0 0 0 1px rgba(102, 79, 48, 0.06);
    }

    .article h3 {
      margin: 0 0 10px;
      font-size: clamp(26px, 3vw, 38px);
      line-height: 1.12;
    }

    .article .updated-at {
      margin-bottom: 20px;
      color: var(--muted);
      font-size: 13px;
    }

    .article .doc-content {
      white-space: pre-wrap;
      line-height: 1.8;
      font-size: 15px;
      color: #3a2f22;
    }

    .empty,
    .status {
      display: grid;
      place-items: center;
      min-height: 240px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.5);
      color: var(--muted);
      text-align: center;
      padding: 24px;
      line-height: 1.7;
    }

    .status.error {
      color: #a8432b;
      background: rgba(229, 103, 66, 0.1);
    }

    @media (max-width: 900px) {
      .shell {
        width: min(100%, calc(100% - 16px));
        margin: 8px auto;
        padding: 14px;
        border-radius: 22px;
      }

      .header,
      .content-header {
        display: block;
      }

      .meta {
        margin-top: 10px;
        text-align: left;
      }

      .layout {
        grid-template-columns: 1fr;
        min-height: auto;
      }

      .tree-panel,
      .content-panel {
        min-height: auto;
      }

      .article {
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="header">
      <div class="title-wrap">
        <h1>飞书知识库镜像</h1>
        <p>按页面层级浏览文档，点击左侧目录即可查看内容。</p>
      </div>
      <div class="meta" id="sync-meta">准备加载知识库…</div>
    </header>

    <section class="layout">
      <aside class="panel tree-panel">
        <div class="tree-header">
          <h2>Knowledge Tree</h2>
          <span class="count-badge" id="doc-count">0 docs</span>
        </div>
        <div id="tree-root" class="status">正在加载目录…</div>
      </aside>

      <section class="panel content-panel">
        <div class="content-header">
          <h2>Document</h2>
          <div class="breadcrumbs" id="breadcrumbs">请选择左侧文档</div>
        </div>
        <article id="article-root" class="empty">
          知识库加载完成后，左侧会显示完整的页面树。
        </article>
      </section>
    </section>
  </main>

  <script>
    const MANIFEST_URL = "content/documents-index.json";
    const DOCS_DIR_URL = "content/documents/";

    const state = {
      docs: [],
      docsById: new Map(),
      docsByNodeToken: new Map(),
      docCache: new Map(),
      activeId: null,
    };

    async function loadDocs() {
      setTreeStatus("正在加载目录…");
      try {
        const docs = await loadDocsFromManifest();
        initializeDocs(docs, "manifest");
      } catch (manifestError) {
        try {
          const docs = await loadDocsFromDirectoryListing();
          initializeDocs(docs, "directory");
        } catch (directoryError) {
          setTreeStatus(`加载失败：${directoryError.message}`, true);
          document.getElementById("article-root").className = "status error";
          document.getElementById("article-root").textContent = "无法加载知识库内容，请检查同步产物是否已发布。";
          document.getElementById("sync-meta").textContent = "加载失败";
          console.error("Manifest error:", manifestError);
          console.error("Directory error:", directoryError);
        }
      }
    }

    async function loadDocsFromManifest() {
      const response = await fetch(MANIFEST_URL, { cache: "no-store" });
      if (!response.ok) {
        throw new Error(`manifest 请求失败 (${response.status})`);
      }

      const payload = await response.json();
      return (payload.documents || []).map((doc) => normalizeDocMeta(doc));
    }

    async function loadDocsFromDirectoryListing() {
      const response = await fetch(DOCS_DIR_URL, { cache: "no-store" });
      if (!response.ok) {
        throw new Error(`目录列表请求失败 (${response.status})`);
      }

      const html = await response.text();
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, "text/html");
      const links = doc.querySelectorAll("a");
      const files = [];

      links.forEach((link) => {
        const href = link.getAttribute("href");
        if (href && href.endsWith(".json")) {
          files.push(DOCS_DIR_URL + href);
        }
      });

      const docs = await Promise.all(
        files.map(async (file, index) => {
          const item = await fetch(file, { cache: "no-store" }).then((res) => res.json());
          return normalizeDocMeta({
            ...item,
            file,
            order: index,
            embedded: item,
          });
        })
      );

      return docs;
    }

    function normalizeDocMeta(doc) {
      const normalized = { ...doc };
      normalized.file = doc.file || `${DOCS_DIR_URL}${doc.id}.json`;
      normalized.node_token = doc.node_token || doc.id;
      normalized.parent_node_token = doc.parent_node_token || null;
      normalized.title = doc.title || "Untitled";
      normalized.order = Number.isFinite(doc.order) ? doc.order : Number.MAX_SAFE_INTEGER;
      return normalized;
    }

    function initializeDocs(docs, source) {
      state.docs = docs;
      state.docsById = new Map();
      state.docsByNodeToken = new Map();
      state.docCache = new Map();

      docs.forEach((doc) => {
        state.docsById.set(doc.id, doc);
        state.docsByNodeToken.set(doc.node_token, doc);
        if (doc.embedded) {
          state.docCache.set(doc.id, doc.embedded);
        }
      });

      document.getElementById("doc-count").textContent = `${docs.length} docs`;
      document.getElementById("sync-meta").textContent =
        source === "manifest"
          ? "已从同步清单加载目录"
          : "未找到同步清单，已回退到目录扫描模式";

      if (docs.length === 0) {
        setTreeStatus("当前没有可展示的文档。");
        return;
      }

      renderTree(buildTree(docs));
      selectDoc(docs[0].id);
    }

    function buildTree(docs) {
      const nodeMap = new Map();
      docs.forEach((doc) => {
        nodeMap.set(doc.node_token, { doc, children: [] });
      });

      const roots = [];
      docs.forEach((doc) => {
        const current = nodeMap.get(doc.node_token);
        if (doc.parent_node_token && nodeMap.has(doc.parent_node_token)) {
          nodeMap.get(doc.parent_node_token).children.push(current);
        } else {
          roots.push(current);
        }
      });

      const sortNodes = (nodes) => {
        nodes.sort((left, right) => {
          if (left.doc.order !== right.doc.order) {
            return left.doc.order - right.doc.order;
          }
          return left.doc.title.localeCompare(right.doc.title, "zh-CN");
        });
        nodes.forEach((node) => sortNodes(node.children));
      };

      sortNodes(roots);
      return roots;
    }

    function renderTree(tree) {
      const root = document.getElementById("tree-root");
      root.className = "";
      root.innerHTML = "";
      root.appendChild(renderTreeList(tree));
    }

    function renderTreeList(nodes) {
      const list = document.createElement("ul");
      list.className = "tree-list";

      nodes.forEach((node) => {
        const item = document.createElement("li");
        item.className = "tree-item";

        const button = document.createElement("button");
        button.className = "tree-button";
        button.dataset.docId = node.doc.id;
        button.innerHTML = `
          <span class="tree-title">${escapeHtml(node.doc.title)}</span>
          <span class="tree-meta">${formatUpdatedAt(node.doc.updated_at)}</span>
        `;
        button.addEventListener("click", () => selectDoc(node.doc.id));
        item.appendChild(button);

        if (node.children.length > 0) {
          item.appendChild(renderTreeList(node.children));
        }

        list.appendChild(item);
      });

      return list;
    }

    async function selectDoc(docId) {
      state.activeId = docId;
      highlightActiveNode();

      const article = document.getElementById("article-root");
      article.className = "status";
      article.textContent = "正在加载文档内容…";

      try {
        const doc = await getFullDoc(docId);
        renderDoc(doc);
      } catch (error) {
        article.className = "status error";
        article.textContent = `文档加载失败：${error.message}`;
      }
    }

    function highlightActiveNode() {
      document.querySelectorAll(".tree-button").forEach((button) => {
        button.classList.toggle("active", button.dataset.docId === state.activeId);
      });
    }

    async function getFullDoc(docId) {
      if (state.docCache.has(docId)) {
        return state.docCache.get(docId);
      }

      const meta = state.docsById.get(docId);
      if (!meta) {
        throw new Error("未找到文档元数据");
      }

      const response = await fetch(meta.file, { cache: "no-store" });
      if (!response.ok) {
        throw new Error(`文档请求失败 (${response.status})`);
      }

      const doc = await response.json();
      state.docCache.set(docId, doc);
      return doc;
    }

    function renderDoc(doc) {
      const article = document.getElementById("article-root");
      article.className = "article";
      article.innerHTML = `
        <h3>${escapeHtml(doc.title || "Untitled")}</h3>
        <div class="updated-at">最近更新：${formatUpdatedAt(doc.updated_at)}</div>
        <div class="doc-content">${escapeHtml(doc.raw_content || "（无内容）")}</div>
      `;

      document.getElementById("breadcrumbs").textContent = buildBreadcrumbs(doc).join(" / ");
    }

    function buildBreadcrumbs(doc) {
      const names = [];
      const visited = new Set();
      let current = doc;

      while (current && current.node_token && !visited.has(current.node_token)) {
        visited.add(current.node_token);
        names.unshift(current.title || "Untitled");

        if (!current.parent_node_token) {
          break;
        }

        current = state.docsByNodeToken.get(current.parent_node_token);
      }

      return names.length > 0 ? names : ["未找到层级信息"];
    }

    function setTreeStatus(message, isError = false) {
      const root = document.getElementById("tree-root");
      root.className = isError ? "status error" : "status";
      root.textContent = message;
    }

    function formatUpdatedAt(value) {
      if (!value) {
        return "更新时间未知";
      }

      const date = typeof value === "number" ? new Date(value) : new Date(String(value));
      if (Number.isNaN(date.getTime())) {
        return String(value);
      }

      return date.toLocaleString("zh-CN", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
      });
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    loadDocs();
  </script>
</body>
</html>
