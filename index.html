<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>站点维护中</title>
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
  <style>
    :root {
      color-scheme: light;
      --bg: #f4efe6;
      --panel: rgba(255, 252, 246, 0.92);
      --text: #2f261d;
      --muted: #6d5a46;
      --border: rgba(87, 63, 38, 0.14);
      --accent: #8f4b2b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Segoe UI", "PingFang SC", "Noto Sans SC", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(191, 120, 74, 0.18), transparent 42%),
        linear-gradient(180deg, #f7f1e8 0%, var(--bg) 100%);
    }

    main {
      width: min(720px, 100%);
      padding: 40px 32px;
      border: 1px solid var(--border);
      border-radius: 24px;
      background: var(--panel);
      box-shadow: 0 24px 60px rgba(61, 42, 24, 0.12);
      text-align: center;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(32px, 6vw, 48px);
      line-height: 1.1;
    }

    p {
      margin: 10px 0;
      font-size: 16px;
      line-height: 1.75;
      color: var(--muted);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(143, 75, 43, 0.08);
      color: var(--accent);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <main>
    <div class="badge">Maintenance</div>
    <h1>站点暂时关闭</h1>
    <p>当前页面正在做内容整理和微调，公开访问已暂停。</p>
    <p>后续确认无误后，会再重新开放。</p>
  </main>
</body>
</html>
