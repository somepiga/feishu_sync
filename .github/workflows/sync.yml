name: Sync Feishu Docs

on:
  schedule:
    - cron: '0 2 * * *'  # 每天凌晨2点执行
  workflow_dispatch:      # 支持手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Create content directory
        run: mkdir -p content/documents && touch content/documents/.gitkeep

      - name: Run sync script
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_WIKI_TOKEN: ${{ secrets.FEISHU_WIKI_TOKEN }}
        run: python scripts/sync.py

      - name: Commit and push
        run: |
          pwd
          ls -la content/documents/
          git status
          git add content/documents/
          git diff --cached --stat
          git commit -m "Sync feishu docs $(date -u +'%Y-%m-%d %H:%M:%S')" || echo "No changes"
          git push
